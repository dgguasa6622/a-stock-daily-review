name: A股每日复盘

on:
  workflow_dispatch:          # 仅支持手动触发（已停用自动推送）

jobs:
  review:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install akshare pandas pytdx requests
      
      - name: 获取数据 & 生成报告
        run: |
          python scripts/main.py
      
      - name: 发送邮件
        if: env.SMTP_USER != ''
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAILS: ${{ secrets.TO_EMAILS }}
        run: |
          python scripts/send_email.py
      
      - name: 提交报告到仓库
        run: |
          git config user.name "A-Stock Review Bot"
          git config user.email "bot@a-stock-review.local"
          git checkout main || git checkout -b main
          git add docs/
          git diff --staged --quiet || git commit -m "📊 每日复盘报告 $(date +%Y-%m-%d)"
          git push origin main || echo "⚠️ push 失败，跳过"
      
      - name: 设置 GitHub Pages
        uses: actions/configure-pages@v4
      
      - name: 上传 Pages 文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      
      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
